version: '3.9'

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_AUTH_TOKEN: ""
    volumes:
      - endee-data:/data

  backend:
    build: .
    container_name: research-backend
    ports:
      - "8000:8000"
    depends_on:
      - endee
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}

volumes:
  endee-data: